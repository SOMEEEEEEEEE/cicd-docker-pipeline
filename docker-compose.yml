version: "3.9"

services:
  flask-cicd-app:
    image: your-dockerhub-username/flask-demo:latest
    container_name: flask-app
    ports:
      - "5002:5002"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask-cicd-app