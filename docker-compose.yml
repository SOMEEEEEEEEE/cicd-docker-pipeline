version: '3.9'

services:
  web-demo:
    build: .
    container_name: web-demo
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web-demo
    restart: always