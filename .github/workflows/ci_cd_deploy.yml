name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flask-demo .

      - name: Run test container
        run: |
          container_id=$(docker run -d -p 5000:5000 flask-demo)
          sleep 5
          curl -f http://localhost:5000
          docker stop $container_id
          docker rm $container_id

      - name: Docker Hub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag & Push
        run: |
          docker tag flask-demo ${{ secrets.DOCKER_USERNAME }}/flask-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-demo:latest

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create app directory if not exists
            mkdir -p ~/flask-app
            cd ~/flask-app

            # Pull latest repo (or clone if first time)
            if [ -d ".git" ]; then
              git pull
            else
              git clone https://github.com/<your-username>/flask-ci-cd-demo.git .
            fi

            # Pull latest Docker image
            docker pull ${{ secrets.DOCKER_USERNAME }}/flask-demo:latest

            # Stop existing containers
            docker-compose down || true

            # Start containers
            docker-compose up -d